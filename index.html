<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการจองแท็กซี่ ภูเก็ต</title>
    <!-- ดึง Tailwind CSS มาใช้สำหรับตกแต่งความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ดึง React และ ReactDOM มาใช้งาน -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- ดึง Babel มาเพื่อแปลภาษา JSX ให้อ่านได้ในไฟล์ HTML -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <!-- จุดที่แอปพลิเคชันจะมาแสดงผล -->
    <div id="root"></div>

    <!-- โค้ดแอปพลิเคชันของคุณ -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // ส่วนของรูปไอคอน (ฝังไว้ในตัวเพื่อให้ใช้แบบ Offline/Local ได้ง่ายๆ)
        // ==========================================
        const Calendar = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const Users = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const User = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const MapPin = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Navigation = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>;
        const Car = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>;
        const FileText = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
        const DollarSign = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const Copy = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const CheckCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
        const Plus = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const ClipboardList = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;
        const History = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const Briefcase = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
        const Clock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const Edit = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;


        // ==========================================
        // ข้อมูลหลักของระบบ
        // ==========================================
        const JOB_TYPES = [
            'รับเข้าสนามบิน (Airport Pickup)',
            'ส่งออกสนามบิน (Airport Dropoff)',
            'ภูเก็ตซิตี้ทัวร์ (Phuket City Tour)',
            'ย้ายโรงแรม (Hotel Transfer)',
            'เช่าเหมาลำ (Charter)',
            'อื่นๆ (Other)'
        ];

        const VEHICLE_TYPES = [
            'รถตู้ (Van)',
            'รถตู้วีไอพี (VIP Van)',
            'รถเก๋ง (Sedan)',
            'รถ SUV',
            'อื่นๆ (Other)'
        ];

        const BASE_LOCATIONS = [
            'สนามบินภูเก็ต (HKT)',
            'สนามบินสุวรรณภูมิ (BKK)',
            'สนามบินดอนเมือง (DMK)'
        ];

        // ฟังก์ชันแปลงวันที่ 2026-03-20 ให้เป็น 20 มี.ค.
        const formatThaiDateShort = (dateString) => {
            if (!dateString) return '';
            const months = [
                'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 
                'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'
            ];
            const [year, month, day] = dateString.split('-');
            return `${parseInt(day, 10)} ${months[parseInt(month, 10) - 1]}`;
        };

        // ฟังก์ชันแปลงเวลา 24 ชม. เป็น AM/PM
        const formatTimeAMPM = (timeString) => {
            if (!timeString) return '';
            const [hourStr, minute] = timeString.split(':');
            let hour = parseInt(hourStr, 10);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            hour = hour % 12;
            hour = hour ? hour : 12; 
            const formattedHour = hour < 10 ? `0${hour}` : hour; 
            return `${formattedHour}:${minute} ${ampm}`;
        };

        // ฟังก์ชันแปลงชื่อสนามบินให้สั้นลง
        const getAirportShortName = (loc) => {
            if (!loc) return '';
            if (loc.includes('HKT') || loc.includes('ภูเก็ต')) return 'ภูเก็ต';
            if (loc.includes('BKK') || loc.includes('สุวรรณภูมิ')) return 'BKK';
            if (loc.includes('DMK') || loc.includes('ดอนเมือง')) return 'DMK';
            return '';
        };

        // ฟังก์ชันแปลงชื่อรถให้สั้นลง ตัดวงเล็บออก
        const getShortVehicleName = (vehicle) => {
            if (!vehicle) return '';
            let v = vehicle.split('(')[0].trim();
            if (v === 'รถตู้วีไอพี') return 'ตู้วีไอพี'; 
            return v;
        };

        // ฟังก์ชันเรียงลำดับงานตามวันที่และเวลา (มาก่อนอยู่บน)
        const sortBookingsByDateTime = (bookingsArray) => {
            return [...bookingsArray].sort((a, b) => {
                const dateA = a.date || '9999-12-31';
                const dateB = b.date || '9999-12-31';
                const timeA = a.time || '23:59';
                const timeB = b.time || '23:59';
                
                const strA = `${dateA}T${timeA}`;
                const strB = `${dateB}T${timeB}`;
                
                if (strA < strB) return -1;
                if (strA > strB) return 1;
                return 0;
            });
        };

        // ==========================================
        // App Component หลัก
        // ==========================================
        function App() {
            const [bookings, setBookings] = useState([]);
            const [activeTab, setActiveTab] = useState('active'); 
            const [copySuccess, setCopySuccess] = useState('');
            const [editingId, setEditingId] = useState(null); 

            // ระบบจำสถานที่ 5 รายการล่าสุด
            const [recentLocations, setRecentLocations] = useState(() => {
                try {
                const saved = localStorage.getItem('taxi_recent_locations');
                return saved ? JSON.parse(saved) : [];
                } catch (e) {
                return [];
                }
            });

            useEffect(() => {
                localStorage.setItem('taxi_recent_locations', JSON.stringify(recentLocations));
            }, [recentLocations]);

            // Form State
            const initialFormState = {
                date: '',
                timeHour: '',    
                timeMinute: '',  
                timeAMPM: 'AM',  
                pax: '1',        
                customerName: '',
                roomNumber: '',
                jobType: JOB_TYPES[0],
                flightType: '', 
                vehicleType: VEHICLE_TYPES[0],
                pickup: BASE_LOCATIONS[0],
                customPickup: '',
                dropoff: BASE_LOCATIONS[1] || BASE_LOCATIONS[0],
                customDropoff: '',
                conditions: '',
                price: ''
            };
            
            const [formData, setFormData] = useState(initialFormState);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => {
                const updates = { [name]: value };
                
                if (name === 'jobType' && !value.includes('สนามบิน')) {
                    updates.flightType = '';
                }
                
                return { ...prev, ...updates };
                });
            };

            const updateRecentLocations = (newLoc) => {
                if (!newLoc || newLoc.trim() === '') return;
                const trimmedLoc = newLoc.trim();
                if (BASE_LOCATIONS.includes(trimmedLoc)) return;

                setRecentLocations(prev => {
                const filtered = prev.filter(l => l !== trimmedLoc);
                return [trimmedLoc, ...filtered].slice(0, 5);
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                
                const actualPickup = formData.pickup === 'อื่นๆ (พิมพ์ระบุเอง)' ? formData.customPickup : formData.pickup;
                const actualDropoff = formData.dropoff === 'อื่นๆ (พิมพ์ระบุเอง)' ? formData.customDropoff : formData.dropoff;

                if (formData.pickup === 'อื่นๆ (พิมพ์ระบุเอง)') updateRecentLocations(actualPickup);
                if (formData.dropoff === 'อื่นๆ (พิมพ์ระบุเอง)') updateRecentLocations(actualDropoff);

                // แปลงเวลา Hour/Minute/AMPM กลับเป็น 24h เพื่อใช้บันทึก
                let actualTime = '';
                if (formData.timeHour) {
                let hr = parseInt(formData.timeHour, 10);
                const min = (formData.timeMinute || '0').toString().padStart(2, '0');
                if (formData.timeAMPM === 'PM' && hr < 12) hr += 12;
                if (formData.timeAMPM === 'AM' && hr === 12) hr = 0;
                actualTime = `${hr.toString().padStart(2, '0')}:${min}`;
                }

                const bookingDataToSave = {
                ...formData,
                time: actualTime, 
                pickup: actualPickup,
                dropoff: actualDropoff,
                };

                delete bookingDataToSave.timeHour;
                delete bookingDataToSave.timeMinute;
                delete bookingDataToSave.timeAMPM;

                if (editingId) {
                setBookings(prev => prev.map(b => b.id === editingId ? { ...b, ...bookingDataToSave } : b));
                setEditingId(null);
                showCopyMessage('บันทึกการแก้ไขเรียบร้อยแล้ว และจัดเรียงวันที่ใหม่แล้ว');
                } else {
                const newBooking = {
                    id: Date.now().toString(),
                    ...bookingDataToSave,
                    isCleared: false,
                    createdAt: new Date().toISOString()
                };
                setBookings(prev => [...prev, newBooking]);
                }
                
                setFormData({
                ...initialFormState,
                date: formData.date 
                });
                
                setActiveTab('active');
            };

            const handleEdit = (booking) => {
                const isStandardPickup = BASE_LOCATIONS.includes(booking.pickup) || recentLocations.includes(booking.pickup);
                const isStandardDropoff = BASE_LOCATIONS.includes(booking.dropoff) || recentLocations.includes(booking.dropoff);
                
                // แปลงเวลา 24h แตกกลับไปเป็น Hour, Minute, AMPM เพื่อโชว์ในฟอร์ม
                let editHour = '';
                let editMinute = '';
                let editAMPM = 'AM';
                if (booking.time) {
                const [h24, m] = booking.time.split(':');
                let hr = parseInt(h24, 10);
                editAMPM = hr >= 12 ? 'PM' : 'AM';
                hr = hr % 12;
                hr = hr ? hr : 12;
                editHour = hr.toString();
                editMinute = m;
                }
                
                setFormData({
                ...booking,
                timeHour: editHour,
                timeMinute: editMinute,
                timeAMPM: editAMPM,
                flightType: booking.flightType || '', 
                pickup: isStandardPickup ? booking.pickup : 'อื่นๆ (พิมพ์ระบุเอง)',
                customPickup: isStandardPickup ? '' : booking.pickup,
                dropoff: isStandardDropoff ? booking.dropoff : 'อื่นๆ (พิมพ์ระบุเอง)',
                customDropoff: isStandardDropoff ? '' : booking.dropoff,
                });
                
                setEditingId(booking.id);
                setActiveTab(booking.isCleared ? 'cleared' : 'active');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setFormData(initialFormState);
            };

            const toggleClearStatus = (id) => {
                setBookings(prev => prev.map(booking => {
                if (booking.id === id) {
                    return { ...booking, isCleared: !booking.isCleared };
                }
                return booking;
                }));
            };

            const sortedBookings = sortBookingsByDateTime(bookings);
            const activeBookings = sortedBookings.filter(b => !b.isCleared);
            const clearedBookings = sortedBookings.filter(b => b.isCleared);
            const currentDisplayBookings = activeTab === 'active' ? activeBookings : clearedBookings;

            const copyToClipboard = () => {
                if (activeBookings.length === 0) {
                showCopyMessage('ไม่มีรายการงานที่รอจัดรถครับ');
                return;
                }

                let textToCopy = `🚕 รายการจองรถ (อัปเดตล่าสุด)\n====================\n\n`;
                
                activeBookings.forEach((b, index) => {
                textToCopy += `งานที่ ${index + 1}\n`;
                if (b.date) textToCopy += `📅 ${formatThaiDateShort(b.date)}\n`;
                
                textToCopy += `👤 ลูกค้า: ${b.customerName} (${b.pax} ท่าน)\n`;
                
                let shortJob = b.jobType.split('(')[0].trim();
                if (b.jobType.includes('รับเข้าสนามบิน')) {
                    const apt = getAirportShortName(b.pickup);
                    shortJob = `รับเข้า ${apt} ${b.flightType || ''}`.trim();
                } else if (b.jobType.includes('ส่งออกสนามบิน')) {
                    const apt = getAirportShortName(b.dropoff);
                    shortJob = `ส่งออก ${apt} ${b.flightType || ''}`.trim();
                }
                
                let shortVehicle = getShortVehicleName(b.vehicleType);
                
                textToCopy += `📌 ${shortJob} / ${shortVehicle}\n`;
                
                const roomText = b.roomNumber ? b.roomNumber : '....';
                textToCopy += `📍 รับ: ${b.pickup} / ${roomText}\n`;
                
                // ตอนก๊อปปี้ให้โชว์เวลาเป็น AM/PM 
                textToCopy += `⏰ เวลารับ: ${b.time ? formatTimeAMPM(b.time) : '....'}\n`;
                
                textToCopy += `🚩 ส่ง: ${b.dropoff}\n`;
                
                if (b.conditions.trim()) textToCopy += `📝 โน๊ต: ${b.conditions}\n`;
                if (b.price) textToCopy += `💰 ค่างาน: ${b.price} บาท\n`;
                textToCopy += `--------------------\n`;
                });

                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                document.execCommand('copy');
                showCopyMessage('คัดลอกข้อความเรียบร้อยแล้ว! สามารถนำไปวางในแชทได้เลย');
                } catch (err) {
                showCopyMessage('เกิดข้อผิดพลาดในการคัดลอก');
                console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            const showCopyMessage = (msg) => {
                setCopySuccess(msg);
                setTimeout(() => setCopySuccess(''), 3000);
            };

            return (
                <div className="min-h-screen text-gray-800 font-sans pb-20 md:pb-10">
                <header className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
                    <div className="max-w-4xl mx-auto flex justify-between items-center">
                    <div className="flex items-center gap-2">
                        <Car className="h-6 w-6" />
                        <h1 className="text-xl font-bold">ระบบจัดการจองแท็กซี่</h1>
                    </div>
                    <div className="text-sm bg-blue-700 px-3 py-1 rounded-full">
                        รอจัดรถ: {activeBookings.length} งาน
                    </div>
                    </div>
                </header>

                <main className="max-w-4xl mx-auto p-4 flex flex-col md:flex-row gap-6 mt-4">
                    
                    {/* Left Column: Form */}
                    <section className={`w-full md:w-5/12 bg-white rounded-xl shadow-sm border overflow-hidden h-fit transition-all ${editingId ? 'border-amber-400 ring-2 ring-amber-100' : 'border-gray-100'}`}>
                    <div className={`p-4 border-b flex items-center gap-2 ${editingId ? 'bg-amber-50 border-amber-100 text-amber-800' : 'bg-blue-50 border-blue-100 text-blue-800'}`}>
                        {editingId ? <Edit className="h-5 w-5" /> : <Plus className="h-5 w-5" />}
                        <h2 className="font-semibold">{editingId ? 'แก้ไขข้อมูลงาน (Edit Booking)' : 'เพิ่มงานจองใหม่ (New Booking)'}</h2>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="p-4 space-y-4">
                        
                        {/* Date & Time Row */}
                        <div className="grid grid-cols-2 gap-3">
                        <div>
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <Calendar className="h-4 w-4" /> วันที่จอง
                            </label>
                            <input 
                            type="date" 
                            name="date"
                            required
                            value={formData.date}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                            />
                        </div>
                        <div>
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <Clock className="h-4 w-4" /> เวลารับ
                            </label>
                            <div className="flex items-center w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 bg-white h-[38px]">
                            <input 
                                type="number" 
                                name="timeHour"
                                placeholder="HH"
                                min="1" max="12"
                                value={formData.timeHour}
                                onChange={handleInputChange}
                                className="w-1/3 text-center outline-none bg-transparent"
                            />
                            <span className="text-gray-400 font-bold mx-1">:</span>
                            <input 
                                type="number" 
                                name="timeMinute"
                                placeholder="MM"
                                min="0" max="59"
                                value={formData.timeMinute}
                                onChange={handleInputChange}
                                className="w-1/3 text-center outline-none bg-transparent"
                            />
                            <select 
                                name="timeAMPM"
                                value={formData.timeAMPM}
                                onChange={handleInputChange}
                                className="w-1/3 outline-none bg-transparent text-blue-700 font-medium cursor-pointer ml-1"
                            >
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                            </div>
                        </div>
                        </div>

                        {/* Customer & Pax Row */}
                        <div className="grid grid-cols-12 gap-3">
                        <div className="col-span-8">
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <User className="h-4 w-4" /> ชื่อลูกค้า
                            </label>
                            <input 
                            type="text" 
                            name="customerName"
                            required
                            placeholder="เช่น คุณสมชาย"
                            value={formData.customerName}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            />
                        </div>
                        <div className="col-span-4">
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <Users className="h-4 w-4" /> คน (Pax)
                            </label>
                            <input 
                            type="text" 
                            name="pax"
                            required
                            placeholder="เช่น 2+1"
                            value={formData.pax}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                            />
                        </div>
                        </div>

                        {/* Job Type & Vehicle Row */}
                        <div className="grid grid-cols-2 gap-3 items-start">
                        <div className="flex flex-col">
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <Briefcase className="h-4 w-4" /> ประเภทงาน
                            </label>
                            <select 
                            name="jobType"
                            value={formData.jobType}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            >
                            {JOB_TYPES.map(type => <option key={type} value={type}>{type}</option>)}
                            </select>
                            
                            {formData.jobType.includes('สนามบิน') && (
                            <div className="mt-2 flex gap-4 bg-blue-50/50 p-2 rounded-lg border border-blue-100 transition-all">
                                <label className="flex items-center gap-1.5 text-sm cursor-pointer font-medium text-blue-800">
                                <input 
                                    type="radio" 
                                    name="flightType" 
                                    value="ดอม" 
                                    checked={formData.flightType === 'ดอม'} 
                                    onChange={handleInputChange} 
                                    className="w-3.5 h-3.5 text-blue-600 border-gray-300 focus:ring-blue-500" 
                                />
                                ดอม
                                </label>
                                <label className="flex items-center gap-1.5 text-sm cursor-pointer font-medium text-blue-800">
                                <input 
                                    type="radio" 
                                    name="flightType" 
                                    value="อินเตอร์" 
                                    checked={formData.flightType === 'อินเตอร์'} 
                                    onChange={handleInputChange} 
                                    className="w-3.5 h-3.5 text-blue-600 border-gray-300 focus:ring-blue-500" 
                                />
                                อินเตอร์
                                </label>
                            </div>
                            )}
                        </div>
                        
                        <div>
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <Car className="h-4 w-4" /> ประเภทรถ
                            </label>
                            <select 
                            name="vehicleType"
                            value={formData.vehicleType}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            >
                            {VEHICLE_TYPES.map(type => <option key={type} value={type}>{type}</option>)}
                            </select>
                        </div>
                        </div>

                        <div className="space-y-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <div>
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <MapPin className="h-4 w-4 text-green-600" /> สถานที่รับ (Pickup)
                            </label>
                            <select 
                            name="pickup"
                            value={formData.pickup}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-2 bg-white"
                            >
                            <optgroup label="สถานที่หลัก">
                                {BASE_LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                            </optgroup>
                            {recentLocations.length > 0 && (
                                <optgroup label="ใช้ล่าสุด (Recent)">
                                {recentLocations.map(loc => <option key={`pickup-recent-${loc}`} value={loc}>{loc}</option>)}
                                </optgroup>
                            )}
                            <option value="อื่นๆ (พิมพ์ระบุเอง)">อื่นๆ (พิมพ์ระบุเอง)...</option>
                            </select>
                            {formData.pickup === 'อื่นๆ (พิมพ์ระบุเอง)' && (
                            <input 
                                type="text" 
                                name="customPickup"
                                required
                                placeholder="พิมพ์สถานที่รับ..."
                                value={formData.customPickup}
                                onChange={handleInputChange}
                                className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-2"
                            />
                            )}
                            <input 
                            type="text" 
                            name="roomNumber"
                            placeholder="ห้อง / เที่ยวบิน (ถ้ามี)..."
                            value={formData.roomNumber}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            />
                        </div>

                        <div>
                            <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <Navigation className="h-4 w-4 text-red-600" /> สถานที่ส่ง (Dropoff)
                            </label>
                            <select 
                            name="dropoff"
                            value={formData.dropoff}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-2 bg-white"
                            >
                            <optgroup label="สถานที่หลัก">
                                {BASE_LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                            </optgroup>
                            {recentLocations.length > 0 && (
                                <optgroup label="ใช้ล่าสุด (Recent)">
                                {recentLocations.map(loc => <option key={`dropoff-recent-${loc}`} value={loc}>{loc}</option>)}
                                </optgroup>
                            )}
                            <option value="อื่นๆ (พิมพ์ระบุเอง)">อื่นๆ (พิมพ์ระบุเอง)...</option>
                            </select>
                            {formData.dropoff === 'อื่นๆ (พิมพ์ระบุเอง)' && (
                            <input 
                                type="text" 
                                name="customDropoff"
                                required
                                placeholder="พิมพ์สถานที่ส่ง..."
                                value={formData.customDropoff}
                                onChange={handleInputChange}
                                className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            />
                            )}
                        </div>
                        </div>

                        <div>
                        <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <FileText className="h-4 w-4" /> เงื่อนไขเพิ่มเติม / ป้ายชื่อ
                        </label>
                        <textarea 
                            name="conditions"
                            rows="2"
                            placeholder="เช่น ป้ายชื่อรับสนามบิน, ต้องการคาร์ซีทเด็ก..."
                            value={formData.conditions}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"
                        ></textarea>
                        </div>

                        <div>
                        <label className="flex items-center gap-1 text-sm font-medium text-gray-600 mb-1">
                            <DollarSign className="h-4 w-4" /> ค่างาน (บาท)
                        </label>
                        <input 
                            type="number" 
                            name="price"
                            placeholder="ยอดเงิน (เว้นว่างได้ถ้ายอมรับหน้างาน)"
                            value={formData.price}
                            onChange={handleInputChange}
                            className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-blue-600"
                        />
                        </div>

                        <div className="flex gap-2 mt-4">
                        <button 
                            type="submit" 
                            className={`flex-1 text-white font-medium py-3 rounded-lg shadow-sm transition-colors flex justify-center items-center gap-2 ${editingId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-blue-600 hover:bg-blue-700'}`}
                        >
                            {editingId ? <CheckCircle className="h-5 w-5" /> : <Plus className="h-5 w-5" />}
                            {editingId ? 'บันทึกการแก้ไข' : 'บันทึกการจอง'}
                        </button>
                        
                        {editingId && (
                            <button 
                            type="button" 
                            onClick={cancelEdit}
                            className="px-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-lg transition-colors"
                            >
                            ยกเลิก
                            </button>
                        )}
                        </div>
                    </form>
                    </section>

                    {/* Right Column: Active Bookings List */}
                    <section className="w-full md:w-7/12 flex flex-col h-full">
                    {/* Action Bar */}
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div className="flex bg-gray-100 p-1 rounded-lg w-full sm:w-auto">
                        <button 
                            onClick={() => setActiveTab('active')}
                            className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center justify-center gap-2 ${activeTab === 'active' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                            <ClipboardList className="h-4 w-4" /> รอจัดรถ ({activeBookings.length})
                        </button>
                        <button 
                            onClick={() => setActiveTab('cleared')}
                            className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center justify-center gap-2 ${activeTab === 'cleared' ? 'bg-white shadow-sm text-green-600' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                            <History className="h-4 w-4" /> เคลียร์แล้ว ({clearedBookings.length})
                        </button>
                        </div>

                        {activeTab === 'active' && (
                        <button 
                            onClick={copyToClipboard}
                            className="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2 shadow-sm transition-colors"
                        >
                            <Copy className="h-4 w-4" /> คัดลอกข้อความส่งแชท
                        </button>
                        )}
                    </div>

                    {copySuccess && (
                        <div className="bg-green-100 text-green-800 border border-green-200 p-3 rounded-lg mb-4 text-sm flex items-center justify-center gap-2">
                        <CheckCircle className="h-4 w-4" /> {copySuccess}
                        </div>
                    )}

                    {/* Booking Cards List */}
                    <div className="space-y-4 pb-10">
                        {currentDisplayBookings.length === 0 ? (
                        <div className="bg-white rounded-xl border border-dashed border-gray-300 p-10 flex flex-col items-center justify-center text-gray-400">
                            <ClipboardList className="h-12 w-12 mb-3 text-gray-300" />
                            <p>ไม่มีรายการจองในหมวดหมู่นี้</p>
                        </div>
                        ) : (
                        currentDisplayBookings.map((booking, index) => (
                            <div key={booking.id} className={`bg-white rounded-xl shadow-sm border-l-4 p-4 relative transition-all ${editingId === booking.id ? 'border-l-amber-500 ring-1 ring-amber-300 bg-amber-50' : booking.isCleared ? 'border-l-gray-400 opacity-75' : 'border-l-blue-500 hover:shadow-md'}`}>
                            
                            {/* Card Header */}
                            <div className="flex justify-between items-start mb-3 border-b border-gray-100 pb-3">
                                <div>
                                <span className={`inline-block text-xs px-2 py-1 rounded font-medium mb-1 ${editingId === booking.id ? 'bg-amber-200 text-amber-800' : 'bg-blue-100 text-blue-800'}`}>
                                    {editingId === booking.id ? 'กำลังแก้ไข...' : `งานที่ ${activeTab === 'active' ? index + 1 : '-'}`}
                                </span>
                                <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                    {booking.customerName}
                                    <span className="text-sm font-normal text-gray-500">({booking.pax} ท่าน)</span>
                                </h3>
                                <div className="flex items-center gap-3 text-sm text-gray-600 mt-1">
                                    <span className="flex items-center gap-1 font-medium text-blue-700 bg-blue-50 px-1.5 py-0.5 rounded">
                                    <Calendar className="h-3.5 w-3.5"/> 
                                    {booking.date ? formatThaiDateShort(booking.date) : 'ไม่ระบุวันที่'} {booking.time ? `(เวลา ${formatTimeAMPM(booking.time)})` : ''}
                                    </span>
                                    <span className="flex items-center gap-1"><Car className="h-3.5 w-3.5"/> {getShortVehicleName(booking.vehicleType)}</span>
                                </div>
                                </div>

                                <div className="flex items-center gap-2">
                                <button 
                                    onClick={() => handleEdit(booking)} 
                                    className={`p-2 rounded-lg transition-colors ${editingId === booking.id ? 'bg-amber-200 text-amber-800' : 'bg-gray-100 text-gray-500 hover:bg-amber-100 hover:text-amber-700'}`}
                                    title="แก้ไขงาน"
                                >
                                    <Edit className="h-4 w-4" />
                                </button>

                                <label className="flex items-center gap-2 cursor-pointer group bg-gray-50 p-2 rounded-lg border border-gray-200 hover:bg-blue-50 transition-colors">
                                    <input 
                                    type="checkbox" 
                                    checked={booking.isCleared}
                                    onChange={() => toggleClearStatus(booking.id)}
                                    className="w-5 h-5 rounded text-green-600 focus:ring-green-500 border-gray-300 cursor-pointer"
                                    />
                                    <span className={`text-sm font-medium select-none hidden sm:inline ${booking.isCleared ? 'text-green-600' : 'text-gray-600 group-hover:text-blue-700'}`}>
                                    {booking.isCleared ? 'เคลียร์แล้ว' : 'ติ๊กเมื่อเคลียร์'}
                                    </span>
                                </label>
                                </div>
                            </div>

                            {/* Card Body - Route & Details */}
                            <div className="space-y-2 mb-3">
                                <div className="flex items-start gap-2">
                                <div className="mt-0.5"><MapPin className="h-4 w-4 text-green-600" /></div>
                                <div className="text-sm">
                                    <span className="text-gray-500 text-xs block">รับจาก (Pickup)</span>
                                    <span className="font-medium text-gray-800">
                                    {booking.pickup} {booking.roomNumber && <span className="text-gray-500 font-normal ml-1">/ {booking.roomNumber}</span>}
                                    </span>
                                </div>
                                </div>
                                <div className="flex items-start gap-2">
                                <div className="mt-0.5"><Navigation className="h-4 w-4 text-red-600" /></div>
                                <div className="text-sm">
                                    <span className="text-gray-500 text-xs block">ส่งที่ (Dropoff)</span>
                                    <span className="font-medium text-gray-800">{booking.dropoff}</span>
                                </div>
                                </div>
                            </div>

                            {/* Card Footer - Price & Conditions */}
                            <div className="bg-gray-50 rounded-lg p-3 text-sm grid grid-cols-1 sm:grid-cols-2 gap-2 border border-gray-100">
                                <div>
                                <span className="text-gray-500 text-xs block mb-0.5">ประเภทงาน</span>
                                <span className="font-medium">
                                    {booking.jobType.split('(')[0].trim()}
                                    {booking.jobType.includes('สนามบิน') && booking.flightType && (
                                    <span className="text-blue-600 ml-1">({booking.flightType})</span>
                                    )}
                                </span>
                                </div>
                                <div>
                                <span className="text-gray-500 text-xs block mb-0.5">ค่างาน</span>
                                <span className="font-bold text-blue-700">{booking.price ? `${Number(booking.price).toLocaleString()} บาท` : 'ไม่ระบุ'}</span>
                                </div>
                                {booking.conditions && (
                                <div className="sm:col-span-2 mt-1 pt-2 border-t border-gray-200">
                                    <span className="text-gray-500 text-xs block mb-0.5">โน๊ต</span>
                                    <span className="text-amber-700 font-medium">{booking.conditions}</span>
                                </div>
                                )}
                            </div>

                            </div>
                        ))
                        )}
                    </div>
                    </section>

                </main>
                </div>
            );
        }

        // ==========================================
        // สั่งให้ React เริ่มทำงานและแสดงผลลงในหน้าเว็บ
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
